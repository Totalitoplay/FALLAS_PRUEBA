<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R3 Scripts - Visor KMZ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        /* Estilos base (Mantenidos según tu diseño) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #topbar { background: #1e293b; color: white; padding: 0 20px; display: flex; align-items: center; gap: 16px; height: 52px; flex-shrink: 0; }
        #topbar h1 { font-size: 15px; font-weight: 700; }
        #tabs { display: flex; gap: 4px; margin-left: auto; }
        
        .tab-btn { padding: 6px 20px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: #94a3b8; transition: all 0.15s; }
        .tab-btn.active { background: #2563eb; color: white; }

        #view-lista, #view-mapa { flex: 1; overflow: hidden; display: none; flex-direction: column; }
        #view-lista.active, #view-mapa.active { display: flex; }

        /* Mapa y Toolbar */
        #mapa-toolbar { background: #1e293b; padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
        #mapa-toolbar input, #mapa-toolbar select { padding: 6px 10px; border-radius: 6px; border: none; font-size: 13px; background: #334155; color: white; }
        #btn-ir { background: #ea580c; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        #btn-capas { background: #0f6e56; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-weight: 600; cursor: pointer; }

        #mapa-body { flex: 1; display: flex; overflow: hidden; position: relative; }
        #map { flex: 1; z-index: 1; }

        /* Panel Lateral de Capas */
        #panel-capas {
            width: 280px; background: white; border-left: 1px solid #e2e8f0;
            display: flex; flex-direction: column;
            position: absolute; right: 0; top: 0; bottom: 0;
            z-index: 1000; transform: translateX(100%); transition: transform 0.25s ease;
            box-shadow: -4px 0 12px rgb(0 0 0 / 0.1);
        }
        #panel-capas.abierto { transform: translateX(0); }
        #capas-header { background: #1e293b; color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        #capas-lista { flex: 1; overflow-y: auto; padding: 10px; }
        
        .subcarpeta-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; }
        .subcarpeta-item input { cursor: pointer; }
    </style>
</head>
<body>

<div id="topbar">
    <h1>⚡ R3 Scripts</h1>
    <div id="tabs">
        <button class="tab-btn active" onclick="switchTab('lista')">📋 Lista</button>
        <button class="tab-btn" onclick="switchTab('mapa')">🗺 Mapa</button>
    </div>
</div>

<div id="view-lista" class="active">
    <!-- Contenido de lista omitido para brevedad, manten tu HTML original aquí -->
</div>

<div id="view-mapa">
    <div id="mapa-toolbar">
        <select id="kmzSelect">
            <option value="">— KMZ —</option>
            <option value="ALDAMA_1.kmz">Aldama 1</option>
            <option value="ALDAMA_2.kmz">Aldama 2</option>
        </select>
        <input type="file" id="fileInput" accept=".kmz">
        <input type="text" id="latInput" placeholder="Latitud">
        <input type="text" id="lngInput" placeholder="Longitud">
        <button id="btn-ir">📍 Ir</button>
        <button id="btn-capas" onclick="togglePanelCapas()">🗂 Capas</button>
        <span id="mapa-pin-info" style="color: #94a3b8; font-size: 12px;"></span>
    </div>
    <div id="mapa-body">
        <div id="map"></div>
        <div id="panel-capas">
            <div id="capas-header">
                <span>🗂 Estructura KMZ</span>
                <button onclick="togglePanelCapas()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
            </div>
            <div id="capas-acciones" style="padding: 10px; border-bottom: 1px solid #eee;">
                <button onclick="toggleTodasCapas(true)" style="font-size:11px; padding:4px 8px; cursor:pointer;">✅ Todas</button>
                <button onclick="toggleTodasCapas(false)" style="font-size:11px; padding:4px 8px; cursor:pointer;">⬜ Ninguna</button>
            </div>
            <div id="capas-lista"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
    var map, pinActual;
    var mapaIniciado = false;
    var kmzMainLayer = L.layerGroup(); 
    var carpetasData = {}; 

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('#view-lista, #view-mapa').forEach(v => v.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('view-' + tab).classList.add('active');
        if (tab === 'mapa' && !mapaIniciado) { iniciarMapa(); }
        if (map) setTimeout(() => map.invalidateSize(), 200);
    }

    function togglePanelCapas() {
        document.getElementById('panel-capas').classList.toggle('abierto');
    }

    function iniciarMapa() {
        if (map) return;
        map = L.map('map').setView([25.68, -100.31], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);
        kmzMainLayer.addTo(map);
        mapaIniciado = true;

        document.getElementById('fileInput').addEventListener('change', async e => {
            const file = e.target.files[0];
            if (file) {
                setPinInfo('Procesando ' + file.name + '...');
                await parsearKMZ(await file.arrayBuffer());
                setPinInfo(file.name + ' ✓');
            }
        });

        document.getElementById('btn-ir').addEventListener('click', irManual);
    }

    async function parsearKMZ(buffer) {
        const zip = await JSZip.loadAsync(buffer);
        const kmlFile = Object.values(zip.files).find(f => f.name.endsWith('.kml'));
        if (!kmlFile) return;
        
        const kmlText = await kmlFile.async('string');
        const kmlDoc = new DOMParser().parseFromString(kmlText, 'text/xml');

        // Extraer estilos (Colores de líneas y polígonos)
        const styles = {};
        kmlDoc.querySelectorAll('Style').forEach(s => {
            const id = s.getAttribute('id');
            if (id) {
                styles['#' + id] = {
                    lineColor: s.querySelector('LineStyle color')?.textContent,
                    polyColor: s.querySelector('PolyStyle color')?.textContent
                };
            }
        });

        kmzMainLayer.clearLayers();
        carpetasData = {};
        const listaUI = document.getElementById('capas-lista');
        listaUI.innerHTML = '';

        function procesarNodo(nodo, containerUI) {
            const folders = nodo.querySelectorAll(':scope > Folder');
            
            folders.forEach(folder => {
                const name = folder.querySelector(':scope > name')?.textContent || "Carpeta";
                const id = 'f_' + Math.random().toString(36).substr(2, 9);
                const group = L.layerGroup().addTo(kmzMainLayer);
                carpetasData[id] = group;

                const item = document.createElement('div');
                item.className = 'subcarpeta-item';
                item.innerHTML = `
                    <input type="checkbox" checked id="cb_${id}">
                    <span>${name}</span>
                `;
                
                item.querySelector('input').onchange = (e) => {
                    if (e.target.checked) group.addTo(map);
                    else group.removeFrom(map);
                };
                containerUI.appendChild(item);

                // Procesar Placemarks (puntos, líneas)
                folder.querySelectorAll(':scope > Placemark').forEach(pm => {
                    const layer = crearCapa(pm, styles);
                    if (layer) layer.addTo(group);
                });

                // Recursión para subcarpetas
                const subContainer = document.createElement('div');
                subContainer.style.marginLeft = "15px";
                subContainer.style.borderLeft = "1px solid #ddd";
                containerUI.appendChild(subContainer);
                procesarNodo(folder, subContainer);
            });
        }

        procesarNodo(kmlDoc.querySelector('Document') || kmlDoc, listaUI);
        
        const bounds = L.featureGroup(Object.values(carpetasData)).getBounds();
        if (bounds.isValid()) map.fitBounds(bounds);
    }

    function crearCapa(pm, styles) {
        const name = pm.querySelector('name')?.textContent || '';
        const styleUrl = pm.querySelector('styleUrl')?.textContent;
        const style = styles[styleUrl] || {};
        
        const kmlToHex = (c) => {
            if (!c || c.length < 8) return '#2563eb';
            return '#' + c.substr(6, 2) + c.substr(4, 2) + c.substr(2, 2);
        };

        const coordStr = pm.querySelector('coordinates')?.textContent.trim();
        if (!coordStr) return null;
        
        const pts = coordStr.split(/\s+/).map(p => p.split(',').map(Number));

        if (pm.querySelector('Point')) {
            return L.circleMarker([pts[0][1], pts[0][0]], { radius: 5, color: '#ea580c', fillOpacity: 0.8 }).bindPopup(name);
        }
        if (pm.querySelector('LineString')) {
            return L.polyline(pts.map(p => [p[1], p[0]]), { color: kmlToHex(style.lineColor), weight: 3 }).bindPopup(name);
        }
        return null;
    }

    function toggleTodasCapas(visible) {
        Object.keys(carpetasData).forEach(id => {
            const cb = document.getElementById('cb_' + id);
            if (cb) {
                cb.checked = visible;
                if (visible) carpetasData[id].addTo(map);
                else carpetasData[id].removeFrom(map);
            }
        });
    }

    function setPinInfo(txt) { document.getElementById('mapa-pin-info').textContent = txt; }

    function irManual() {
        const lat = parseFloat(document.getElementById('latInput').value);
        const lng = parseFloat(document.getElementById('lngInput').value);
        if (isNaN(lat) || isNaN(lng)) return;
        
        if (pinActual) map.removeLayer(pinActual);
        pinActual = L.marker([lat, lng]).addTo(map);
        map.setView([lat, lng], 16);
    }
</script>
</body>
</html>
