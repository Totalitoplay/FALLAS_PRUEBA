<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R3 Scripts</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        /* Estilos originales preservados */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #topbar { background: #1e293b; color: white; padding: 0 20px; display: flex; align-items: center; gap: 16px; height: 52px; flex-shrink: 0; }
        #topbar h1 { font-size: 15px; font-weight: 700; color: white; white-space: nowrap; }
        #inventarioStatus { font-size: 12px; color: #94a3b8; }
        #tabs { display: flex; gap: 4px; margin-left: auto; }
        .tab-btn { padding: 6px 20px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: #94a3b8; font-family: inherit; width: auto; transition: all 0.15s; }
        .tab-btn:hover { background: #334155; color: white; }
        .tab-btn.active { background: #2563eb; color: white; }
        #view-lista, #view-mapa { flex: 1; overflow: hidden; display: none; flex-direction: column; }
        #view-lista.active, #view-mapa.active { display: flex; }

        /* Lista */
        #lista-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; align-items: center; }
        .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; width: 100%; max-width: 860px; box-shadow: 0 1px 3px rgb(0 0 0 / 0.06); }
        .card-title { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
        label { display: block; font-weight: 600; font-size: 13px; color: #64748b; margin-bottom: 6px; }
        textarea { width: 100%; height: 90px; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; font-size: 13px; resize: vertical; }
        .btn-primary { background: #2563eb; color: white; border: none; padding: 11px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; font-family: inherit; width: 100%; transition: background 0.15s; }
        .btn-ghost { background: #f1f5f9; color: #475569; border: none; padding: 9px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; font-family: inherit; width: 100%; margin-top: 8px; transition: background 0.15s; }

        #resultTable { width: 100%; max-width: 860px; border-collapse: separate; border-spacing: 0; background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; box-shadow: 0 1px 3px rgb(0 0 0 / 0.06); }
        #resultTable thead th { background: #1e293b; color: #f8fafc; text-align: left; padding: 13px 16px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; }
        #resultTable tbody td { padding: 11px 16px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        /* Mapa y Panel de Capas */
        #mapa-toolbar { background: #1e293b; padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
        #mapa-toolbar select, #mapa-toolbar input { padding: 6px 10px; border-radius: 6px; border: none; font-size: 13px; background: #334155; color: white; font-family: inherit; }
        #mapa-body { flex: 1; display: flex; overflow: hidden; position: relative; }
        #map { flex: 1; }
        #panel-capas { width: 280px; background: white; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.25s ease; position: absolute; right: 0; top: 0; bottom: 0; z-index: 1000; box-shadow: -4px 0 12px rgb(0 0 0 / 0.1); }
        #panel-capas.abierto { transform: translateX(0); }
        #capas-header { background: #1e293b; color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        #capas-lista { flex: 1; overflow-y: auto; padding: 8px 0; }
        
        .carpeta-root-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; background: #f8fafc; border-bottom: 1px solid #f1f5f9; }
        .subcarpetas { padding-left: 20px; display: none; }
        .subcarpetas.visible { display: block; }
        .subcarpeta-item { display: flex; align-items: center; gap: 8px; padding: 6px 14px; font-size: 12px; }

        @media (max-width: 600px) { #panel-capas { width: 100%; } }
    </style>
</head>
<body>

<div id="topbar">
    <h1>⚡ R3 Scripts</h1>
    <span id="inventarioStatus">⏳ Cargando inventario...</span>
    <div id="tabs">
        <button class="tab-btn active" onclick="switchTab('lista')">📋 Lista</button>
        <button class="tab-btn" onclick="switchTab('mapa')">🗺 Mapa</button>
    </div>
</div>

<div id="view-lista" class="active">
    <div id="lista-scroll">
        <div class="card">
            <div class="card-title">Cargar clientes</div>
            <div style="display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px;">
                <div style="flex:1; min-width:180px;">
                    <label>Subir CSV</label>
                    <input type="file" id="clientCsvFile" accept=".csv">
                </div>
                <div style="flex:1; min-width:180px;">
                    <label>Pegar reporte</label>
                    <textarea id="reportInput" placeholder="Pega aquí el reporte..."></textarea>
                </div>
            </div>
            <button class="btn-primary" onclick="procesarBusqueda()">🔍 Localizar QRs</button>
        </div>
        <table id="resultTable">
            <thead>
                <tr><th>Estado</th><th>Cuenta</th><th>QR</th><th>Coordenadas</th><th>Mapa</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="view-mapa">
    <div id="mapa-toolbar">
        <select id="kmzSelect">
            <option value="">— KMZ —</option>
            <option value="ALDAMA_1.kmz">Aldama 1</option>
            <option value="ALDAMA_2.kmz">Aldama 2</option>
        </select>
        <input type="file" id="fileInput" accept=".kmz" title="Subir KMZ">
        <input type="text" id="latInput" placeholder="Latitud">
        <input type="text" id="lngInput" placeholder="Longitud">
        <button id="btn-ir" onclick="irManual()">📍 Ir</button>
        <button id="btn-capas" onclick="togglePanelCapas()">🗂 Capas</button>
        <span id="mapa-pin-info"></span>
    </div>
    <div id="mapa-body">
        <div id="map"></div>
        <div id="panel-capas">
            <div id="capas-header">
                <span>🗂 Capas del KMZ</span>
                <button onclick="togglePanelCapas()" style="background:none; border:none; color:#94a3b8; cursor:pointer; font-size:18px;">✕</button>
            </div>
            <div id="capas-lista"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="app.js?v=100"></script>

<script>
    var mapaIniciado = false;
    var map, pinActual;
    var carpetasData = {}; // Estructura jerárquica para las capas
    const BASE_URL = 'https://api.allorigins.win/raw?url=https://raw.githubusercontent.com/Totalitoplay/kmz-finder/main/';

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view, #view-lista, #view-mapa').forEach(v => v.classList.remove('active'));
        const targetBtn = document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`);
        if(targetBtn) targetBtn.classList.add('active');
        document.getElementById('view-' + tab).classList.add('active');
        if (tab === 'mapa') {
            if (!mapaIniciado) { iniciarMapa(); mapaIniciado = true; }
            else setTimeout(() => map.invalidateSize(), 100);
        }
    }

    function togglePanelCapas() { document.getElementById('panel-capas').classList.toggle('abierto'); }

    function iniciarMapa() {
        map = L.map('map').setView([25.68, -100.31], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        document.getElementById('kmzSelect').addEventListener('change', function() {
            if (this.value) cargarKMZDesdeURL(this.value);
        });
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0]; if (!file) return;
            setPinInfo('Cargando ' + file.name + '...');
            await parsearKMZ(await file.arrayBuffer());
        });
    }

    async function cargarKMZDesdeURL(filename) {
        setPinInfo('Cargando ' + filename + '...');
        try {
            const r = await fetch(BASE_URL + filename);
            if (!r.ok) throw new Error('HTTP ' + r.status);
            await parsearKMZ(await r.arrayBuffer());
            setPinInfo(filename + ' ✓');
        } catch (err) { setPinInfo('Error: ' + err.message); }
    }

    async function parsearKMZ(buffer) {
        // Limpiar capas previas
        Object.values(carpetasData).forEach(root => {
            root.group.removeFrom(map);
            Object.values(root.subs).forEach(s => s.group.removeFrom(map));
        });
        carpetasData = {};
        document.getElementById('capas-lista').innerHTML = '';

        const zip = await JSZip.loadAsync(buffer);
        const kmlFile = Object.values(zip.files).find(f => f.name.endsWith('.kml'));
        const kmlDoc = new DOMParser().parseFromString(await kmlFile.async('string'), 'text/xml');

        // Estilos
        const styles = extraerEstilos(kmlDoc);

        // Procesar Carpetas
        const folders = kmlDoc.querySelectorAll('Folder');
        folders.forEach(folder => {
            const name = folder.querySelector('name')?.textContent || "Carpeta";
            const parentFolder = folder.parentElement.tagName === 'Folder' ? folder.parentElement : null;
            
            const group = L.layerGroup().addTo(map);
            const placemarks = folder.querySelectorAll(':scope > Placemark');
            
            placemarks.forEach(pm => {
                const layers = crearLayersDesdePlacemark(pm, styles);
                layers.forEach(l => group.addLayer(l));
            });

            if (!parentFolder) {
                // Carpeta Raíz
                carpetasData[name] = { group, subs: {} };
            } else {
                // Subcarpeta
                const parentName = parentFolder.querySelector('name')?.textContent || "Raíz";
                if (!carpetasData[parentName]) carpetasData[parentName] = { group: L.layerGroup().addTo(map), subs: {} };
                carpetasData[parentName].subs[name] = { group };
            }
        });

        renderizarUIListaCapas();
        if (Object.keys(carpetasData).length > 0) {
            const firstGroup = Object.values(carpetasData)[0].group;
            // fitBounds opcional aquí
        }
    }

    function crearLayersDesdePlacemark(pm, styles) {
        const styleUrl = pm.querySelector('styleUrl')?.textContent?.trim();
        const style = styles[styleUrl] || {};
        const name = pm.querySelector('name')?.textContent || '';
        const coordsStr = pm.querySelector('coordinates')?.textContent || '';
        const pts = coordsStr.trim().split(/\s+/).map(c => {
            const p = c.split(',').map(Number);
            return [p[1], p[0]];
        });

        const results = [];
        if (pm.querySelector('Point') && pts[0]) {
            results.push(L.marker(pts[0]).bindPopup(name));
        } else if (pm.querySelector('LineString')) {
            results.push(L.polyline(pts, { color: 'red' }).bindPopup(name));
        } else if (pm.querySelector('Polygon')) {
            results.push(L.polygon(pts, { color: 'blue' }).bindPopup(name));
        }
        return results;
    }

    function extraerEstilos(doc) {
        const s = {};
        doc.querySelectorAll('Style').forEach(node => {
            const id = node.getAttribute('id');
            if (id) s['#' + id] = { color: node.querySelector('LineStyle color')?.textContent };
        });
        return s;
    }

    function renderizarUIListaCapas() {
        const lista = document.getElementById('capas-lista');
        Object.entries(carpetasData).forEach(([name, data]) => {
            const id = 'f_' + Math.random().toString(36).substr(2, 5);
            const div = document.createElement('div');
            div.innerHTML = `
                <div class="carpeta-root-header" onclick="document.getElementById('${id}').classList.toggle('visible')">
                    <input type="checkbox" checked onclick="event.stopPropagation(); toggleRoot('${name}', this.checked)">
                    <span class="carpeta-nombre-root">${name}</span>
                </div>
                <div class="subcarpetas" id="${id}"></div>
            `;
            const subContainer = div.querySelector('.subcarpetas');
            Object.entries(data.subs).forEach(([subName, subData]) => {
                const subDiv = document.createElement('div');
                subDiv.className = 'subcarpeta-item';
                subDiv.innerHTML = `
                    <input type="checkbox" checked onchange="toggleSub('${name}', '${subName}', this.checked)">
                    <span>${subName}</span>
                `;
                subContainer.appendChild(subDiv);
            });
            lista.appendChild(div);
        });
    }

    function toggleRoot(name, visible) {
        const root = carpetasData[name];
        if (visible) map.addLayer(root.group); else map.removeLayer(root.group);
        Object.values(root.subs).forEach(s => {
            if (visible) map.addLayer(s.group); else map.removeLayer(s.group);
        });
    }

    function toggleSub(rootName, subName, visible) {
        const sub = carpetasData[rootName].subs[subName];
        if (visible) map.addLayer(sub.group); else map.removeLayer(sub.group);
    }

    function setPinInfo(t) { document.getElementById('mapa-pin-info').innerText = t; }
    function irManual() { /* Lógica de ir a lat/lng */ }
    function irACoordenadas(la, ln, label) {
        switchTab('mapa');
        setTimeout(() => {
            if (pinActual) map.removeLayer(pinActual);
            pinActual = L.marker([la, ln]).addTo(map).bindPopup(label).openPopup();
            map.setView([la, ln], 16);
        }, 200);
    }
</script>
</body>
</html>
